<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWLondon Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0b1626, #1a2a4a);
      color: #e0f0ff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 20px; }
    .glass {
      background: rgba(20, 35, 70, 0.45);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(100, 180, 255, 0.25);
      border-radius: 28px;
      box-shadow: 0 12px 50px rgba(0, 0, 0, 0.5);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }
    header { text-align: center; padding: 4rem 0 2rem; position: relative; }
    h1 {
      font-size: 3.4rem;
      background: linear-gradient(90deg, #67e8f9, #bae6fd, #67e8f9);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleGlow 6s ease infinite;
    }
    @keyframes titleGlow { 0%,100% { background-position: 0%; } 50% { background-position: 100%; } }

    /* Settings Button */
    #settings-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      background: rgba(103, 232, 249, 0.9);
      color: #0f172a;
      border: none;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(103, 232, 249, 0.4);
      z-index: 100;
    }

    /* Modal */
    #settings-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: rgba(15, 23, 42, 0.98);
      padding: 32px;
      border-radius: 24px;
      width: 90%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      border: 1px solid rgba(103, 232, 249, 0.3);
    }
    .modal-content h2 { text-align: center; margin-bottom: 24px; color: #67e8f9; }
    label { display: block; margin: 18px 0 8px; font-weight: 500; }
    input[type="range"] { width: 100%; accent-color: #67e8f9; }
    button { margin-top: 25px; width: 100%; padding: 14px; background: #67e8f9; color: #0f172a; border: none; border-radius: 16px; font-weight: 600; cursor: pointer; }

    /* Rest of your styles */
    .status-section, .warnings, .tabs, .places-grid, .radar-section { margin: 1.8rem 0; }
    .heat-warning { position: fixed; top: 25px; right: 25px; background: rgba(251, 191, 36, 0.95); color: #1e2937; padding: 16px 22px; border-radius: 18px; font-weight: 600; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 100; max-width: 280px; }
  </style>
</head>
<body>
  <header>
    <div class="container glass">
      <h1>SWLondon Forecast</h1>
      <p>Somerset & London Weather</p>
    </div>
    <button id="settings-btn">⚙️</button>
  </header>

  <main class="container">
    <!-- Heat Warning -->
    <div class="heat-warning glass">
      <strong>🔥 HEAT WARNING</strong><br>
      Please wear sunscreen, hats, sunglasses.<br>
      Drink plenty of WATER!
    </div>

    <!-- Status -->
    <div class="status-section glass">
      <h2>🌐 Website Current Status</h2>
      <iframe src="https://swlforecast.betteruptime.com/badge?theme=dark" width="250" height="30" frameborder="0" scrolling="no" style="color-scheme: normal; border-radius: 8px;"></iframe>
      <p style="margin-top: 15px; opacity: 0.9;">Website is still being updated — expect occasional random outages.</p>
    </div>

    <!-- Warnings, Tabs, Places, Radar remain the same -->
    <div class="warnings" id="warnings"></div>
    <div class="tabs">
      <button class="tab-btn active" data-section="london">🌆 London Area</button>
      <button class="tab-btn" data-section="somerset">🌳 Somerset</button>
    </div>
    <div id="places-grid" class="places-grid"></div>
    <div class="radar-section">
      <h2>🌧️ Live Rainfall Radar (UK)</h2>
      <iframe src="https://www.rainviewer.com/map.html?loc=51.5,-0.1,8" allowfullscreen></iframe>
    </div>
    <p id="last-updated" class="last-updated">Last updated: just now</p>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal">
    <div class="modal-content glass">
      <h2>⚙️ Settings</h2>
      
      <label>Liquid Glass Transparency: <span id="trans-value">30</span>%</label>
      <input type="range" id="transparency" min="0" max="50" value="30">

      <label><input type="checkbox" id="show-london" checked> Show London Section</label>
      <label><input type="checkbox" id="show-somerset" checked> Show Somerset Section</label>

      <label>Theme: 
        <select id="theme-select">
          <option value="dark">Dark Mode</option>
          <option value="light">Light Mode</option>
        </select>
      </label>

      <label><input type="checkbox" id="fahrenheit"> Show Temperature in Fahrenheit</label>

      <button id="close-settings">Save & Close</button>
    </div>
  </div>

  <script>
    // === Your existing script (warnings, places, renderSection, etc.) ===
    const warningsConfig = [ /* your warnings */ ];
    // ... (keep all your existing weather code here)

    // Settings
    const modal = document.getElementById('settings-modal');
    document.getElementById('settings-btn').addEventListener('click', () => modal.style.display = 'flex');
    document.getElementById('close-settings').addEventListener('click', () => modal.style.display = 'none');

    document.getElementById('transparency').addEventListener('input', function() {
      document.getElementById('trans-value').textContent = this.value;
    });

    // Initial load
    renderWarnings();
    renderSection('london');
  </script>
</body>
</html>
