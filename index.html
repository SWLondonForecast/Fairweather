<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWLondon Forecast | Somerset & London Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    header { text-align: center; padding: 3rem 0 2rem; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #334155; }
    h1 { font-size: 3rem; background: linear-gradient(to right, #60a5fa, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Warnings */
    .warnings { margin: 1rem 0; display: flex; flex-direction: column; gap: 10px; }
    .warning {
      padding: 16px 20px;
      border-radius: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .yellow { background: #facc15; color: #1e2937; }
    .amber { background: #f59e0b; color: #1e2937; }
    .red { background: #ef4444; color: white; }

    select {
      padding: 12px 16px;
      font-size: 1.1rem;
      background: #334155;
      color: white;
      border: none;
      border-radius: 12px;
      margin: 1rem 0;
    }

    .current-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2.5rem;
      margin: 1.5rem 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .temperature { font-size: 5.5rem; font-weight: 700; line-height: 1; }

    footer { text-align: center; padding: 3rem 0; opacity: 0.7; font-size: 0.95rem; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>SWLondon Forecast</h1>
      <p>Real-time Weather • Somerset & Greater London</p>
    </div>
  </header>

  <main class="container">
    <!-- Warnings -->
    <div class="warnings" id="warnings"></div>

    <!-- Location Selector -->
    <select id="location-select">
      <optgroup label="London Area">
        <option value="london">London (Central)</option>
        <option value="hyde">Hyde Park</option>
        <option value="westminster">Westminster</option>
        <option value="swindon">Swindon</option>
      </optgroup>
      <optgroup label="Somerset">
        <option value="taunton">Taunton</option>
        <option value="yeovil">Yeovil</option>
        <option value="ilminster">Ilminster</option>
        <option value="crewkerne">Crewkerne</option>
        <option value="shepton">Shepton Mallet</option>
      </optgroup>
    </select>

    <div id="current-weather" class="current-card">
      <div>
        <div id="temp" class="temperature">--°C</div>
        <div id="condition" style="font-size:1.4rem; margin-top:8px;">--</div>
        <div id="location-name" style="margin-top:12px; font-size:1.25rem; font-weight:500;">--</div>
      </div>
      <div class="details">
        <p>Feels like: <span id="feels-like">--</span>°C</p>
        <p>Humidity: <span id="humidity">--</span>%</p>
        <p>Wind: <span id="wind">--</span> km/h</p>
      </div>
    </div>

    <p id="last-updated" style="text-align:center; margin:15px 0; opacity:0.7;">Last updated: just now</p>
  </main>

  <footer>
    <p>Data from Open-Meteo • Auto-updates every 15 minutes</p>
  </footer>

  <script>
    // ====================== LOCATIONS ======================
    const locations = {
      london: { lat: 51.5074, lon: -0.1278, name: "London (Central)" },
      hyde: { lat: 51.5073, lon: -0.1657, name: "Hyde Park" },
      westminster: { lat: 51.4994, lon: -0.1245, name: "Westminster" },
      swindon: { lat: 51.5558, lon: -1.7798, name: "Swindon" },
      taunton: { lat: 51.019, lon: -3.100, name: "Taunton" },
      yeovil: { lat: 50.9416, lon: -2.6323, name: "Yeovil" },
      ilminster: { lat: 50.927, lon: -2.910, name: "Ilminster" },
      crewkerne: { lat: 50.883, lon: -2.795, name: "Crewkerne" },
      shepton: { lat: 51.192, lon: -2.546, name: "Shepton Mallet" }
    };

    // ====================== WARNINGS ======================
    const warningsConfig = [
      { type: "yellow", title: "Yellow Warning", desc: "Yellow Warning Enforced In the UK", visible: true },
      { type: "amber", title: "Amber Warning", desc: "Threat to life and Environment", visible: false },
      { type: "red", title: "Red Warning", desc: "Danger to Life and Environment", visible: false }
    ];

    function renderWarnings() {
      const container = document.getElementById('warnings');
      container.innerHTML = '';
      warningsConfig.filter(w => w.visible).forEach(w => {
        const div = document.createElement('div');
        div.className = `warning ${w.type}`;
        div.innerHTML = `<strong>${w.title}</strong> — ${w.desc}`;
        container.appendChild(div);
      });
    }

    // ====================== WEATHER ======================
    async function fetchWeather(locKey) {
      const loc = locations[locKey];
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        document.getElementById('temp').textContent = Math.round(data.current.temperature_2m) + "°C";
        document.getElementById('feels-like').textContent = Math.round(data.current.apparent_temperature);
        document.getElementById('humidity').textContent = data.current.relative_humidity_2m;
        document.getElementById('wind').textContent = Math.round(data.current.wind_speed_10m);
        document.getElementById('location-name').textContent = loc.name;

        document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        console.error(e);
      }
    }

    // Location change
    document.getElementById('location-select').addEventListener('change', (e) => {
      fetchWeather(e.target.value);
    });

    // Initial load
    renderWarnings();
    fetchWeather('london');

    // Auto refresh
    setInterval(() => {
      const currentLoc = document.getElementById('location-select').value;
      fetchWeather(currentLoc);
    }, 15 * 60 * 1000);
  </script>
</body>
</html>
